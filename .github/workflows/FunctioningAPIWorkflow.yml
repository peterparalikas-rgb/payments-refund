# This is a basic workflow to help you get started with Actions

name: FunctioningAPIWorkflow

# Controls when the workflow will run
on:
  # Triggers the workflow on push or pull request events but only for the "main" branch
  push:
    branches: [ "main" ]
    paths:
      - 'specs/payment-refund-api-openapi.yaml'
      - '.github/workflows/FunctioningAPIWorkflow.yml'
  pull_request:
    branches: [ "main" ]

  # Allows you to run this workflow manually from the Actions tab
  workflow_dispatch:

# A workflow run is made up of one or more jobs that can run sequentially or in parallel
jobs:
  # This workflow contains a single job called "build"
  onboarding:
    # The type of runner that the job will run on
    runs-on: ubuntu-latest
    permissions:
      actions: write
      contents: write
      pull-requests: write
      deployments: write
      
    # Steps represent a sequence of tasks that will be executed as part of the job
    steps:
      # Checks-out your repository under $GITHUB_WORKSPACE, so your job can access it
      - uses: actions/checkout@v4

      - name: Postman API onboarding
        uses: postman-cs/postman-api-onboarding-action@v0
        with:
          project-name: payment-refund-api
          domain: payments
          domain-code: PAY
          #spec-url: 'https://raw.githubusercontent.com/peterparalikas-rgb/payment-refund/blob/main/specs/payment-refund-api-openapi.yaml'
          spec-url: 'https://gist.github.com/peterparalikas-rgb/50642bf62eef58c67cc1435487d7a399/raw'
          environments-json: '["prod","stage"]'
          env-runtime-urls-json: '{"prod":"https://api.payments.example.com/v2","stage":"https://api-uat.payments.example.com/v2"}'
          system-env-map-json: '{}'
          governance-mapping-json: '{}'
          postman-api-key: ${{ secrets.POSTMAN_API_KEY }}
          postman-access-token: ${{ secrets.POSTMAN_ACCESS_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          gh-fallback-token: ${{ secrets.GH_FALLBACK_TOKEN }}
